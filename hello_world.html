<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Ibni Dev Future</title>
    
    <!-- Font & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            transition: background 1s ease, color 1s ease;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.6; }
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }

        /* Moving text animation */
        .animated-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            animation: floatText 3s ease-in-out infinite, glowPulse 2s infinite alternate;
            transition: opacity 0.5s ease, transform 0.5s ease;
            margin-bottom: 2rem;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        @keyframes glowPulse {
            from { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
            to { text-shadow: 0 0 40px currentColor, 0 0 80px currentColor; }
        }

        .fade-out {
            opacity: 0 !important;
            transform: scale(0.9) !important;
        }

        /* Image container for last state */
        .bye-image {
            width: 180px;
            height: 180px;
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
            animation: spinSlow 10s linear infinite;
            display: none;
            transition: all 0.5s ease;
        }

        .bye-image.show {
            display: block;
        }

        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bye-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .animated-text {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .bye-image {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- Particles Background -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="animated-text" id="textDisplay">HELLO WORLD</div>
        <div class="bye-image" id="byeImage">
            <!-- Gambar untuk "See You Next Time" -->
            <img src="https://cdn-icons-png.flaticon.com/512/5977/5977593.png" alt="Bye">
        </div>
    </div>

    <script>
        (function() {
            // --- GENERATE PARTICLES ---
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 8 + 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
                particlesContainer.appendChild(particle);
            }

            // --- STATE MANAGEMENT ---
            const states = [
                {
                    text: 'HELLO WORLD',
                    bg: '#0a0a1a',
                    color: '#00ffff',
                    accent: '#00ffff'
                },
                {
                    text: 'HELLO EVERYONE',
                    bg: '#0d1b2a',
                    color: '#39ff14',
                    accent: '#39ff14'
                },
                {
                    text: 'SELAMAT DATANG DI PROJECT IBNI DEV',
                    bg: '#2a0a1a',
                    color: '#ff6b6b',
                    accent: '#ff6b6b'
                },
                {
                    text: 'COMING SOON',
                    bg: '#1a0a2e',
                    color: '#da70d6',
                    accent: '#da70d6'
                },
                {
                    text: 'SEE YOU NEXT TIME BYE',
                    bg: '#0a0a0a',
                    color: '#ffffff',
                    accent: '#ffffff'
                }
            ];

            let currentState = 0;
            const textDisplay = document.getElementById('textDisplay');
            const byeImage = document.getElementById('byeImage');
            let intervalId;

            // --- FUNCTION TO CHANGE STATE ---
            function changeState() {
                // Fade out text
                textDisplay.classList.add('fade-out');

                // After transition, update content
                setTimeout(() => {
                    const state = states[currentState];

                    // Update body background
                    document.body.style.backgroundColor = state.bg;
                    document.body.style.color = state.color;

                    // Update text and color
                    textDisplay.textContent = state.text;
                    textDisplay.style.color = state.color;
                    textDisplay.style.textShadow = `0 0 30px ${state.accent}`;

                    // Show/hide bye image
                    if (currentState === states.length - 1) {
                        byeImage.classList.add('show');
                        // Trigger AI voice
                        speakText('see you next time, bye');
                    } else {
                        byeImage.classList.remove('show');
                    }

                    // Remove fade-out class (fade in)
                    textDisplay.classList.remove('fade-out');

                    // Move to next state
                    currentState = (currentState + 1) % states.length;
                }, 500); // match CSS transition duration
            }

            // --- AI VOICE USING WEB SPEECH API ---
            function speakText(message) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(message);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.1;
                    // Try to use a more "AI-like" voice if available
                    const voices = speechSynthesis.getVoices();
                    const preferredVoice = voices.find(voice => 
                        voice.name.includes('Google US English') || 
                        voice.name.includes('Samantha') || 
                        voice.name.includes('Alex')
                    );
                    if (preferredVoice) utterance.voice = preferredVoice;
                    speechSynthesis.speak(utterance);
                }
            }

            // Preload voices (some browsers need this)
            window.speechSynthesis.onvoiceschanged = () => {};

            // --- INITIAL STATE & CYCLE ---
            // Set initial state (first state already applied in HTML, but ensure background)
            document.body.style.backgroundColor = states[0].bg;
            textDisplay.style.color = states[0].color;
            textDisplay.style.textShadow = `0 0 30px ${states[0].accent}`;
            currentState = 1; // because first state already displayed, next call will change to state[1]

            // Change every 7 seconds
            intervalId = setInterval(changeState, 7000);

            // Cleanup on page unload (optional)
            window.addEventListener('beforeunload', () => {
                clearInterval(intervalId);
            });
        })();
    </script>
</body>
</html>
